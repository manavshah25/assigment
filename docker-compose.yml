services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: invoices
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  mock-psp:
    build:
      context: .
    command: mock-psp
    ports:
      - "8081:8081"
    environment:
      RUST_LOG: mock_psp=debug

  api:
    build:
      context: .
    command: invoice-service
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/invoices
      PSP_URL: http://mock-psp:8081
      RUST_LOG: invoice_service=debug,tower_http=debug
    depends_on:
      postgres:
        condition: service_healthy
      mock-psp:
        condition: service_started

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      TEST_BASE_URL: http://api:8080
    depends_on:
      api:
        condition: service_started
    profiles:
      - test

volumes:
  pgdata:
